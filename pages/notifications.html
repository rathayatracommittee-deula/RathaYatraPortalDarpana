<h3>
<img src="../images/icons/bell.png"
class="card-small-title-icon">

</h3>

<p>Receive updates about:</p>

<p>
<img src="../images/icons/image.png"
class="card-verysmall-title-icon">
New Photos
</p>

<p>
<img src="../images/icons/videos.png"
class="card-verysmall-title-icon">

<p>
<img src="../images/icons/live-tv.png"

</p>

<p>

<div class="card menu-card" onclick="enableNotify()">

<img src="../images/icons/notification-on.png"
class="card-search-title-icon">

</div>

<div class="card menu-card" onclick="disableNotify()">

<img src="../images/icons/notification-off.png"
class="card-search-title-icon">

<div>Disable Notifications</div>

</div>

<h3>Status</h3>

</p>

<script>

function updateStatus(){

let status = localStorage.getItem("notifications");

if(status=="enabled"){

document.getElementById("statusText").innerHTML="🟢 Notifications are Enabled";

}else{

document.getElementById("statusText").innerHTML="🔴 Notifications are Disabled";

}

}

function enableNotify(){

localStorage.setItem("notifications","enabled");

alert("Notifications Enabled Successfully!");

updateStatus();

}

function disableNotify(){

localStorage.setItem("notifications","disabled");

alert("Notifications Disabled.");

updateStatus();

}

updateStatus();

</script>
