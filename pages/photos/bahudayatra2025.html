const gallery=document.getElementById("gallery");
let currentIndex = 0;
document.getElementById("photoCount").innerText =
`${photos.length} Photos`;

photos.forEach(photo=>{

gallery.innerHTML+=`

<img
src="${imageFolder}${photo}"
class="gallery-photo"
loading="lazy"
onclick="openPopup(this.src)">

`;

});

function openPopup(imageSrc){

    currentIndex = photos.findIndex(
        photo => imageSrc.includes(photo)
    );

    document.getElementById("photoPopup").style.display="flex";

    document.getElementById("popupImage").src=imageSrc;

    document.getElementById("downloadBtn").href=imageSrc;
}

function closePopup(){

    document.getElementById("photoPopup").style.display="none";
}
document.getElementById("photoPopup").addEventListener("click",function(e){

    if(e.target===this){

        closePopup();
    }

});

function prevPhoto(){

    currentIndex--;

    if(currentIndex < 0){

        currentIndex = photos.length - 1;
    }

    let imagePath =
imageFolder +
photos[currentIndex];

    document.getElementById("popupImage").src =
    imagePath;

    document.getElementById("downloadBtn").href =
    imagePath;
}

function nextPhoto(){

    currentIndex++;

    if(currentIndex >= photos.length){

        currentIndex = 0;
    }

   let imagePath =
imageFolder +
photos[currentIndex];

    document.getElementById("popupImage").src =
    imagePath;

    document.getElementById("downloadBtn").href =
    imagePath;
}

<script>

document.documentElement.scrollTop > 300){

}else{

topBtn.style.display = "none";

}

};

function scrollToTop(){

window.scrollTo({

top:0,

behavior:"smooth"

});
