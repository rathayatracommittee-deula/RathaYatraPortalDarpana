<div id="photoPopup" class="popup">

    <span class="close-btn" onclick="closePopup()">✖</span>

    <div class="popup-nav">

    <button onclick="prevPhoto()" class="nav-btn">⬅</button>

    <img id="popupImage">

    <button onclick="nextPhoto()" class="nav-btn">➡</button>

</div>

    <a id="downloadBtn" download>
    Download Photo
</a>

</div>

<script>

const imageFolder = "../../images/2026/bahudayatra/";

const photos = [


];

const gallery=document.getElementById("gallery");
let currentIndex = 0;
document.getElementById("photoCount").innerText =
`${photos.length} Photos`;

photos.forEach(photo=>{

gallery.innerHTML+=`

<img
src="${imageFolder}${photo}"
class="gallery-photo"
loading="lazy"
onclick="openPopup(this.src)">

`;

});

function openPopup(imageSrc){

    currentIndex = photos.findIndex(
        photo => imageSrc.includes(photo)
    );

    document.getElementById("photoPopup").style.display="flex";

    document.getElementById("popupImage").src=imageSrc;

    document.getElementById("downloadBtn").href=imageSrc;
}

function closePopup(){

    document.getElementById("photoPopup").style.display="none";
}
document.getElementById("photoPopup").addEventListener("click",function(e){

    if(e.target===this){

        closePopup();
    }

});

function prevPhoto(){

    currentIndex--;

    if(currentIndex < 0){

        currentIndex = photos.length - 1;
    }

    let imagePath =
imageFolder +
photos[currentIndex];

    document.getElementById("popupImage").src =
    imagePath;

    document.getElementById("downloadBtn").href =
    imagePath;
}

function nextPhoto(){

    currentIndex++;

    if(currentIndex >= photos.length){

        currentIndex = 0;
    }

   let imagePath =
imageFolder +
photos[currentIndex];

    document.getElementById("popupImage").src =
    imagePath;

    document.getElementById("downloadBtn").href =
    imagePath;
}

</script>

<button id="topBtn" onclick="scrollToTop()">
⬆
</button>

<script>

const topBtn =
document.getElementById("topBtn");

window.onscroll = function(){

if(document.body.scrollTop > 300 ||
document.documentElement.scrollTop > 300){

topBtn.style.display = "block";

}else{

topBtn.style.display = "none";

}

};

function scrollToTop(){

window.scrollTo({

top:0,

behavior:"smooth"

});

}

</script>


</body>
