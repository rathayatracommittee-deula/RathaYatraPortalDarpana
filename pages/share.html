<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Share</title>
</head>
<body>

<script>

const websiteURL = "https://rathayatracommittee-deula.github.io/RathaYatraPortalDarpana/pages/home.html";

if(navigator.share){

navigator.share({

title:"ରଥଯାତ୍ରା ପୋର୍ଟାଲ",

text:"Visit our Website : THE ଦର୍ପଣ",

url:websiteURL

}).final(()=>{

window.location.href="home.html";

});

}else{

navigator.clipboard.writeText(websiteURL);

alert("Website link copied.");

window.location.href="home.html";

}

</script>

</body>
</html>
